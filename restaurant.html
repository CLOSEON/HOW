<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #111827;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      background: rgba(255,255,255,0.05);
    }

    header h1 {
      color: #f59e0b;
      font-size: 2.5rem;
    }

    .menu {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .item {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
      text-align: center;
    }

    .item:hover {
      transform: translateY(-10px);
      background: rgba(255,255,255,0.1);
    }

    .item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    .item h3 {
      margin: 10px 0;
      color: #f59e0b;
    }

    .price {
      font-weight: bold;
      margin-top: 5px;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: #f59e0b;
      color: black;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.8;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

<header>
  <h1>🍽️ My Restaurant</h1>
  <p>Delicious food, delivered with love</p>
</header>

<section class="menu">

  <div class="item">
    <img src="https://source.unsplash.com/400x300/?pizza" alt="Pizza">
    <h3>Pizza</h3>
    <p>Cheesy delight with fresh toppings</p>
    <div class="price">₹199</div>
    <button class="btn" onclick="orderItem('Pizza')">Order</button>
  </div>

  <div class="item">
    <img src="https://source.unsplash.com/400x300/?burger" alt="Burger">
    <h3>Burger</h3>
    <p>Juicy grilled burger with sauces</p>
    <div class="price">₹149</div>
    <button class="btn" onclick="orderItem('Burger')">Order</button>
  </div>

  <div class="item">
    <img src="https://source.unsplash.com/400x300/?pasta" alt="Pasta">
    <h3>Pasta</h3>
    <p>Creamy Italian pasta</p>
    <div class="price">₹179</div>
    <button class="btn" onclick="orderItem('Pasta')">Order</button>
  </div>

  <div class="item">
    <img src="https://source.unsplash.com/400x300/?dessert" alt="Dessert">
    <h3>Dessert</h3>
    <p>Sweet treat to end your meal</p>
    <div class="price">₹99</div>
    <button class="btn" onclick="orderItem('Dessert')">Order</button>
  </div>

</section>

<footer>
  <p>© 2026 My Restaurant</p>
</footer>

<script>
  function orderItem(item) {
    alert(item + " added to order!");
  }
</script>

</body>
</html>
