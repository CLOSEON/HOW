<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .quiz-container {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    h2 { margin-bottom: 20px; color: #facc15; }

    .option {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover { background: #facc15; color: black; }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #facc15;
      color: black;
      cursor: pointer;
    }

    .score { margin-top: 15px; font-weight: bold; }
  </style>
</head>

<body>

<div class="quiz-container">
  <h2 id="question">Question here</h2>

  <div id="options"></div>

  <button class="btn" onclick="nextQuestion()">Next</button>

  <div class="score" id="score"></div>
</div>

<script>
  const quiz = [
    {
      q: "What is the capital of India?",
      options: ["Mumbai", "Delhi", "Chennai", "Kolkata"],
      answer: "Delhi"
    },
    {
      q: "Which language is used for web styling?",
      options: ["HTML", "CSS", "Python", "Java"],
      answer: "CSS"
    },
    {
      q: "Which is not a programming language?",
      options: ["Java", "Python", "HTML", "C++"],
      answer: "HTML"
    }
  ];

  let index = 0;
  let score = 0;
  let selected = null;

  function loadQuestion() {
    const q = quiz[index];
    document.getElementById('question').innerText = q.q;

    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';

    q.options.forEach(opt => {
      const div = document.createElement('div');
      div.classList.add('option');
      div.innerText = opt;

      div.onclick = () => {
        selected = opt;
        document.querySelectorAll('.option').forEach(o => o.style.background = 'rgba(255,255,255,0.1)');
        div.style.background = '#facc15';
        div.style.color = 'black';
      };

      optionsDiv.appendChild(div);
    });
  }

  function nextQuestion() {
    if (selected === quiz[index].answer) score++;

    index++;
    selected = null;

    if (index < quiz.length) {
      loadQuestion();
    } else {
      document.getElementById('question').innerText = 'Quiz Finished!';
      document.getElementById('options').innerHTML = '';
      document.getElementById('score').innerText = 'Score: ' + score + '/' + quiz.length;
    }
  }

  loadQuestion();
</script>

</body>
</html>
