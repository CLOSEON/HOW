<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body { background: #0f172a; color: white; }

    header {
      text-align: center; padding: 20px;
      background: rgba(255,255,255,0.05);
    }

    header h1 { color: #facc15; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 15px;
      padding: 30px;
    }

    .gallery img {
      width: 100%; height: 200px; object-fit: cover;
      border-radius: 12px; cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
    }

    .lightbox img {
      max-width: 90%; max-height: 80%;
      border-radius: 10px;
    }

    .close {
      position: absolute;
      top: 20px; right: 30px;
      font-size: 30px;
      cursor: pointer;
      color: #fff;
    }

    .nav-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      font-size: 30px;
      cursor: pointer;
      color: #fff;
      padding: 10px;
    }

    .prev { left: 20px; }
    .next { right: 20px; }

  </style>
</head>
<body>

<header>
  <h1>Image Gallery</h1>
</header>

<div class="gallery" id="gallery">
  <img src="https://source.unsplash.com/400x300/?nature" onclick="openLightbox(0)">
  <img src="https://source.unsplash.com/400x300/?mountain" onclick="openLightbox(1)">
  <img src="https://source.unsplash.com/400x300/?beach" onclick="openLightbox(2)">
  <img src="https://source.unsplash.com/400x300/?city" onclick="openLightbox(3)">
  <img src="https://source.unsplash.com/400x300/?forest" onclick="openLightbox(4)">
  <img src="https://source.unsplash.com/400x300/?night" onclick="openLightbox(5)">
</div>

<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <span class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</span>
  <img id="lightboxImg">
  <span class="nav-btn next" onclick="changeSlide(1)">&#10095;</span>
</div>

<script>
  const images = document.querySelectorAll('#gallery img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');

  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    lightbox.style.display = 'flex';
    showImage();
  }

  function closeLightbox() {
    lightbox.style.display = 'none';
  }

  function showImage() {
    lightboxImg.src = images[currentIndex].src;
  }

  function changeSlide(step) {
    currentIndex += step;

    if (currentIndex < 0) currentIndex = images.length - 1;
    if (currentIndex >= images.length) currentIndex = 0;

    showImage();
  }

  // Close on background click
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (lightbox.style.display === 'flex') {
      if (e.key === 'ArrowRight') changeSlide(1);
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'Escape') closeLightbox();
    }
  });
</script>

</body>
</html>
