<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Catalogue</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 500px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
    }

    h1 { text-align: center; color: #facc15; margin-bottom: 15px; }

    input, button {
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      width: 100%;
    }

    button {
      background: #facc15;
      color: black;
      cursor: pointer;
    }

    ul { margin-top: 10px; list-style: none; }

    li {
      background: rgba(255,255,255,0.08);
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>Library Catalogue</h1>

  <input type="text" id="title" placeholder="Book Title">
  <button onclick="addBook()">Add Book</button>

  <input type="text" id="search" placeholder="Search by title" onkeyup="searchBook()">

  <ul id="list"></ul>

  <p id="status"></p>
</div>

<script>
  const capacity = 5;
  let books = ["JavaScript", "Python", "C++"];

  function render(list = books) {
    const ul = document.getElementById('list');
    ul.innerHTML = '';

    list.forEach((book, index) => {
      const li = document.createElement('li');
      li.innerHTML = `${book} <button class="delete" onclick="removeBook(${index})">X</button>`;
      ul.appendChild(li);
    });

    document.getElementById('status').innerText = `Books: ${books.length}/${capacity}`;
  }

  function addBook() {
    const title = document.getElementById('title').value.trim();

    if (!title) return;

    if (books.length >= capacity) {
      alert("Library is full!");
      return;
    }

    books.push(title);
    document.getElementById('title').value = '';
    render();
  }

  function removeBook(index) {
    books.splice(index, 1);
    render();
  }

  function searchBook() {
    const query = document.getElementById('search').value.toLowerCase();

    const filtered = books.filter(book => book.toLowerCase().includes(query));
    render(filtered);
  }

  render();
</script>

</body>
</html>
